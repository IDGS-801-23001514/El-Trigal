<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Panadería{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#efe3c6]">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-[#9c775b] text-white flex flex-col items-center py-6">
        <div class="mb-10">
            <img src="{{ url_for('static', filename='img/logo.png') }}" class="w-24">
        </div>

        <nav class="w-full space-y-2 px-2">

    <!-- Productos -->
    <a href="{{ url_for('productos.inicio') }}"
       class="block px-6 py-3 rounded-lg transition
       {% if request.endpoint.startswith('productos') %}
           bg-[#ae712f] text-white
       {% else %}
           bg-[#b9772b] hover:bg-[#ae712f]/80 text-white
       {% endif %}">
        Productos
    </a>

    <!-- Categorías -->
    <a href="{{ url_for('categorias_productos.inicio') }}"
       class="block px-6 py-3 rounded-lg transition
       {% if request.endpoint.startswith('categorias_productos') %}
           bg-[#ae712f] text-white
       {% else %}
           bg-[#b9772b] hover:bg-[#ae712f]/80 text-white
       {% endif %}">
        Categorías de productos
    </a>

</nav>
    </aside>

    <!-- Contenido -->
    <main class="flex-1 p-8">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
